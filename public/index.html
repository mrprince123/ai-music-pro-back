<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Studio</title>
    <meta name="description" content="Admin dashboard for uploading music and managing data.">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for Modern icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="blob w-[500px] h-[500px] bg-indigo-500/40 -top-[10%] -left-[10%] animate-[float_10s_infinite_ease-in-out_alternate]"></div>
    <div class="blob w-[600px] h-[600px] bg-purple-500/30 -bottom-[20%] -right-[10%] animate-[float_10s_infinite_ease-in-out_alternate] [animation-delay:-5s]"></div>
    <div class="blob w-[400px] h-[400px] bg-pink-500/20 top-[40%] left-[40%] animate-[float_10s_infinite_ease-in-out_alternate] [animation-delay:-2.5s]"></div>

    <main class="app-container">
        <!-- Toast Notification Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- VIEW: Login -->
        <section id="login-view" class="view glass-panel active flex-col max-w-[420px] mx-auto py-12 px-8">
            <div class="text-center mb-10">
                <div class="inline-flex justify-center items-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 text-3xl text-white mb-6 shadow-[0_4px_20px_rgba(139,92,246,0.4)]">
                    <ion-icon name="musical-notes"></ion-icon>
                </div>
                <h1 class="text-2xl font-bold mb-2">Studio Admin</h1>
                <p class="text-slate-400">Sign in to your dashboard</p>
            </div>
            
            <form id="login-form" class="flex flex-col gap-6">
                <div>
                    <label for="email" class="form-label">Email address</label>
                    <div class="input-wrapper">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="email" id="email" name="email" required placeholder="admin@example.com" class="glass-input">
                    </div>
                </div>
                
                <div>
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="password" name="password" required placeholder="••••••••" class="glass-input">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary mt-4 py-4" id="login-btn">
                    <span>Sign In</span>
                    <ion-icon name="arrow-forward-outline"></ion-icon>
                </button>
            </form>
        </section>

        <!-- VIEW: Dashboard -->
        <section id="dashboard-view" class="view flex-col gap-8 min-h-[80vh]">
            <header class="glass-panel flex justify-between items-center py-4 px-8">
                <div class="flex items-center gap-3">
                    <ion-icon name="musical-notes" class="text-3xl text-purple-500"></ion-icon>
                    <h2 class="text-xl font-bold tracking-tight">Studio</h2>
                </div>
                <div class="flex items-center gap-6">
                    <div class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider border border-green-500/30">Admin Mode</div>
                    <button id="logout-btn" class="btn-icon" title="Logout">
                        <ion-icon name="log-out-outline"></ion-icon>
                    </button>
                </div>
            </header>

            <div class="flex justify-center">
                <!-- Upload Song Panel -->
                <div class="glass-panel w-full max-w-[800px] p-6 md:p-10">
                    <div class="mb-8">
                        <h3 class="text-2xl font-bold mb-1">Publish New Release</h3>
                        <p class="text-slate-400 text-sm">Upload a new track to the streaming platform.</p>
                    </div>
                    
                    <form id="upload-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="songName" class="form-label">Song Title</label>
                                <input type="text" id="songName" name="songName" required placeholder="e.g. Midnight City" class="glass-input">
                            </div>
                            
                            <div>
                                <label for="singerName" class="form-label">Artist Name</label>
                                <input type="text" id="singerName" name="singerName" required placeholder="e.g. M83" class="glass-input">
                            </div>

                            <div class="md:col-span-2">
                                <label for="description" class="form-label">Description (Optional)</label>
                                <textarea id="description" name="description" rows="3" placeholder="Tell the world about this track..." class="glass-input min-h-[80px] py-3"></textarea>
                            </div>

                            <div class="md:col-span-2">
                                <label for="category" class="form-label">Category / Genre</label>
                                <select id="category" name="category" required class="glass-input appearance-none">
                                    <option value="" disabled selected class="bg-slate-900">Select a genre</option>
                                    <option value="pop" class="bg-slate-900">Pop</option>
                                    <option value="electronic" class="bg-slate-900">Electronic</option>
                                    <option value="hip-hop" class="bg-slate-900">Hip Hop</option>
                                    <option value="rock" class="bg-slate-900">Rock</option>
                                    <option value="rnb" class="bg-slate-900">R&B</option>
                                    <option value="lofi" class="bg-slate-900">Lo-Fi</option>
                                    <option value="classical" class="bg-slate-900">Classical</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8 mb-10">
                            <!-- Track Upload -->
                            <div class="file-upload-card" id="track-dropzone">
                                <input type="file" id="song" name="song" accept="audio/mpeg" required class="hidden">
                                <label for="song" class="flex flex-col items-center justify-center py-10 px-4 cursor-pointer text-center">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl mb-4 bg-purple-500/20 text-purple-400 audio-icon">
                                        <ion-icon name="musical-note"></ion-icon>
                                    </div>
                                    <span class="font-semibold mb-1">Upload MP3 Track</span>
                                    <span class="text-xs text-slate-400 max-w-full whitespace-nowrap overflow-hidden text-ellipsis px-2" id="song-filename">Max size: 10MB</span>
                                </label>
                            </div>

                            <!-- Thumbnail Upload -->
                            <div class="file-upload-card" id="thumbnail-dropzone">
                                <input type="file" id="thumbnail" name="thumbnail" accept="image/jpeg, image/png, image/webp" required class="hidden">
                                <label for="thumbnail" class="flex flex-col items-center justify-center py-10 px-4 cursor-pointer text-center">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl mb-4 bg-indigo-500/20 text-indigo-400 image-icon">
                                        <ion-icon name="image"></ion-icon>
                                    </div>
                                    <span class="font-semibold mb-1">Upload Cover Art</span>
                                    <span class="text-xs text-slate-400 max-w-full whitespace-nowrap overflow-hidden text-ellipsis px-2" id="thumbnail-filename">JPEG, PNG, WEBP</span>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary w-full py-4 text-lg" id="upload-btn">
                            <ion-icon name="cloud-upload"></ion-icon>
                            <span>Publish Track</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
